<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="UTOPICO Staff">
<meta name="theme-color" content="#1C1B1B">
<title>UTOPICO — Staff</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1C1B1B; --bg2: #242323; --bg3: #2e2d2d;
  --white: #ffffff; --gray: #888; --gray2: #555;
  --border: rgba(255,255,255,0.08);
}
* { -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--white); -webkit-font-smoothing: antialiased; overflow: hidden; }
.screen { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

#s-login { align-items: center; justify-content: center; background: var(--bg); padding: 2rem; position: relative; overflow: hidden; }
#s-login::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px); pointer-events: none; }
.login-brand { text-align: center; margin-bottom: 3rem; }
.login-logo { font-size: 13px; font-weight: 700; letter-spacing: 6px; color: var(--white); text-transform: uppercase; }
.login-sub { font-size: 9px; font-weight: 300; letter-spacing: 3px; color: var(--gray2); text-transform: uppercase; margin-top: 6px; }
.login-title { font-size: 22px; font-weight: 300; color: var(--white); text-align: center; margin-bottom: .5rem; letter-spacing: 1px; }
.login-hint { font-size: 12px; color: var(--gray2); text-align: center; margin-bottom: 2rem; }

.pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 2.5rem; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--gray2); background: transparent; transition: all .15s; }
.pin-dot.filled { background: var(--white); border-color: var(--white); transform: scale(1.1); }

.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 260px; }
.num { height: 64px; background: var(--bg2); border: 0.5px solid var(--border); color: var(--white); font-family: inherit; font-size: 24px; font-weight: 300; cursor: pointer; transition: all .1s; }
.num:active { background: var(--bg3); transform: scale(0.96); }
.num.del { font-size: 18px; color: var(--gray); }
.num.empty { background: transparent; border-color: transparent; cursor: default; }
.pin-error { font-size: 11px; color: #ff4444; text-align: center; letter-spacing: 1px; text-transform: uppercase; margin-top: 1rem; height: 16px; }

#s-main { background: var(--bg); }
.app-header { background: var(--bg2); padding: 3rem 1.25rem 1rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
.header-brand { font-size: 11px; font-weight: 700; letter-spacing: 4px; color: var(--white); text-transform: uppercase; }
.header-sub { font-size: 8px; font-weight: 300; letter-spacing: 2px; color: var(--gray2); text-transform: uppercase; margin-top: 3px; }
.logout-btn { background: none; border: 0.5px solid var(--border); color: var(--gray); padding: 7px 12px; font-family: inherit; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }

.tab-bar { display: flex; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 13px; text-align: center; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray2); cursor: pointer; background: none; border: none; font-family: inherit; border-bottom: 1.5px solid transparent; margin-bottom: -0.5px; }
.tab.active { color: var(--white); border-bottom-color: var(--white); }

.panel { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
.panel.active { display: flex; }

.scan-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; }
.scan-hint { font-size: 10px; color: var(--gray2); text-align: center; margin-bottom: .75rem; letter-spacing: 1.5px; text-transform: uppercase; }
#reader { border: 0.5px solid var(--border); overflow: hidden; background: var(--bg2); }
#reader video { display: block !important; width: 100% !important; }
#reader img { display: none !important; }

.or-row { display: flex; align-items: center; gap: 10px; margin: 1rem 0; }
.or-row::before, .or-row::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
.or-row span { font-size: 9px; color: var(--gray2); letter-spacing: 1.5px; text-transform: uppercase; }

.search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-input { flex: 1; padding: 12px 14px; background: var(--bg2); border: 0.5px solid var(--border); font-family: inherit; font-size: 14px; color: var(--white); outline: none; }
.search-input:focus { border-color: var(--white); }
.search-input::placeholder { color: var(--gray2); }
.search-btn { background: var(--white); color: var(--bg); border: none; padding: 12px 16px; font-family: inherit; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }

.cx-card { background: var(--bg2); border: 0.5px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; display: none; }
.cx-card.visible { display: block; }
.cx-top { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
.cx-avatar { width: 44px; height: 44px; background: var(--white); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--bg); flex-shrink: 0; }
.cx-name { font-size: 16px; font-weight: 500; }
.cx-email { font-size: 11px; color: var(--gray); margin-top: 3px; }

.cx-stats { display: flex; gap: 1px; background: var(--border); margin-bottom: 1.25rem; }
.cx-stat { flex: 1; background: var(--bg2); padding: .9rem .5rem; text-align: center; }
.cx-stat-n { font-size: 24px; font-weight: 500; line-height: 1; }
.cx-stat-l { font-size: 8px; color: var(--gray2); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

.stamps-mini { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.sm { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 0.5px solid var(--border); }
.sm.on { background: var(--white); border-color: var(--white); }

.reward-alert { background: var(--white); padding: 1rem; margin-bottom: 1rem; display: none; }
.reward-alert strong { display: block; font-size: 14px; font-weight: 700; color: var(--bg); text-transform: uppercase; letter-spacing: 1px; }
.reward-alert p { font-size: 11px; color: #555; margin-top: 3px; }

.action-btn { width: 100%; padding: 15px; border: none; font-family: inherit; font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; }
.btn-primary { background: var(--white); color: var(--bg); }
.btn-primary:disabled { background: var(--bg3); color: var(--gray2); cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--white); border: 0.5px solid var(--border); display: none; }

.hist-list { flex: 1; overflow-y: auto; }
.hist-item { display: flex; align-items: center; gap: 12px; padding: 13px 1.25rem; border-bottom: 0.5px solid var(--border); }
.hist-av { width: 34px; height: 34px; background: var(--bg2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--gray); flex-shrink: 0; }
.hist-info { flex: 1; }
.hist-name { font-size: 13px; font-weight: 500; }
.hist-time { font-size: 11px; color: var(--gray); margin-top: 2px; }
.hist-badge { font-size: 10px; font-weight: 500; padding: 4px 10px; background: var(--bg3); color: var(--white); }
.hist-badge.redeem { background: var(--white); color: var(--bg); }
.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; }
.empty-state p { font-size: 11px; color: var(--gray2); letter-spacing: 1px; text-transform: uppercase; }

.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--white); color: var(--bg); padding: .8rem 1.5rem; font-size: 12px; font-weight: 500; z-index: 999; transition: transform .3s ease; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="screen active" id="s-login">
  <div class="login-brand">
    <div class="login-logo">UTOPICO</div>
    <div class="login-sub">Staff access</div>
  </div>
  <div class="login-title">Enter PIN</div>
  <p class="login-hint">4-digit staff code</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="num" onclick="np('1')">1</button>
    <button class="num" onclick="np('2')">2</button>
    <button class="num" onclick="np('3')">3</button>
    <button class="num" onclick="np('4')">4</button>
    <button class="num" onclick="np('5')">5</button>
    <button class="num" onclick="np('6')">6</button>
    <button class="num" onclick="np('7')">7</button>
    <button class="num" onclick="np('8')">8</button>
    <button class="num" onclick="np('9')">9</button>
    <button class="num empty"></button>
    <button class="num" onclick="np('0')">0</button>
    <button class="num del" onclick="nd()">⌫</button>
  </div>
  <p class="pin-error" id="pin-err"></p>
</div>

<div class="screen" id="s-main">
  <div class="app-header">
    <div><div class="header-brand">UTOPICO</div><div class="header-sub">Staff panel</div></div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('scan',this)">Scan</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
  </div>

  <div class="panel active" id="panel-scan">
    <div class="scan-body">
      <p class="scan-hint">Point camera at customer QR code</p>
      <div id="reader"></div>
      <div class="or-row"><span>or search by email</span></div>
      <div class="search-row">
        <input type="email" class="search-input" id="search-email" placeholder="customer@email.com" onkeydown="if(event.key==='Enter')searchEmail()">
        <button class="search-btn" onclick="searchEmail()">Search</button>
      </div>
      <div class="cx-card" id="cx-card">
        <div class="cx-top">
          <div class="cx-avatar" id="cx-av">MG</div>
          <div><div class="cx-name" id="cx-name"></div><div class="cx-email" id="cx-email"></div></div>
        </div>
        <div class="cx-stats">
          <div class="cx-stat"><div class="cx-stat-n" id="cx-stamps">0</div><div class="cx-stat-l">Stamps</div></div>
          <div class="cx-stat"><div class="cx-stat-n" id="cx-total">0</div><div class="cx-stat-l">Visits</div></div>
          <div class="cx-stat"><div class="cx-stat-n" id="cx-rewards">0</div><div class="cx-stat-l">Rewards</div></div>
        </div>
        <div class="stamps-mini" id="stamps-mini"></div>
        <div class="reward-alert" id="reward-alert">
          <strong>Free coffee available</strong>
          <p>This customer has earned a free coffee</p>
        </div>
        <button class="action-btn btn-primary" id="add-btn" onclick="addStamp()">+ Add stamp</button>
        <button class="action-btn btn-secondary" id="redeem-btn" onclick="redeemReward()">Redeem free coffee</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-history">
    <div class="hist-list" id="hist-list">
      <div class="empty-state"><p>No activity yet</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL      = 'https://ombypthpxggwqxqptkng.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8CGNBEnrFLv041HyhSuqWw_Q2BX5r-v';
const BARISTA_PIN       = '1234';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let pin = '', currentCustomer = null, scanner = null, scannerActive = false;

function np(d) {
  if (pin.length >= 4) return;
  pin += d; updateDots();
  if (pin.length === 4) setTimeout(checkPin, 100);
}
function nd() { pin = pin.slice(0,-1); updateDots(); }
function updateDots() {
  for (let i = 0; i < 4; i++) document.getElementById('d'+i).classList.toggle('filled', i < pin.length);
}
function checkPin() {
  if (pin === BARISTA_PIN) {
    document.getElementById('s-login').classList.remove('active');
    document.getElementById('s-main').classList.add('active');
    startScanner(); loadHistory(); checkURLScan();
  } else {
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    setTimeout(() => { document.getElementById('pin-err').textContent = ''; pin = ''; updateDots(); }, 1000);
  }
}
function logout() {
  if (scanner && scannerActive) { try { scanner.stop(); } catch {} scannerActive = false; }
  document.getElementById('s-main').classList.remove('active');
  document.getElementById('s-login').classList.add('active');
  pin = ''; updateDots();
  document.getElementById('cx-card').classList.remove('visible');
}
function checkURLScan() {
  const id = new URLSearchParams(window.location.search).get('scan');
  if (id) loadById(id);
}
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab === 'history') loadHistory();
}
function startScanner() {
  scanner = new Html5Qrcode('reader');
  scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 220, height: 220 } },
    (text) => {
      try {
        const id = new URL(text).searchParams.get('scan');
        if (id) { scanner.pause(); loadById(id); }
      } catch {}
    }, () => {}
  ).then(() => scannerActive = true).catch(() => showToast('Camera unavailable — use email search'));
}
async function loadById(id) {
  const { data, error } = await db.from('members').select('*').eq('id', id).single();
  if (error || !data) { showToast('Customer not found.'); return; }
  const { count } = await db.from('redemptions').select('*', { count: 'exact', head: true }).eq('member_id', id);
  data.reward_count = count || 0;
  showCustomer(data);
}
async function searchEmail() {
  const email = document.getElementById('search-email').value.trim();
  if (!email) return;
  const { data, error } = await db.from('members').select('*').eq('email', email).single();
  if (error || !data) { showToast('No customer found.'); return; }
  const { count } = await db.from('redemptions').select('*', { count: 'exact', head: true }).eq('member_id', data.id);
  data.reward_count = count || 0;
  showCustomer(data);
}
function showCustomer(m) {
  currentCustomer = m;
  const stamps = m.stamps || 0;
  document.getElementById('cx-av').textContent = (m.name[0] + m.surname[0]).toUpperCase();
  document.getElementById('cx-name').textContent = m.name + ' ' + m.surname;
  document.getElementById('cx-email').textContent = m.email;
  document.getElementById('cx-stamps').textContent = stamps;
  document.getElementById('cx-total').textContent = m.total_stamps || stamps;
  document.getElementById('cx-rewards').textContent = m.reward_count || 0;
  const grid = document.getElementById('stamps-mini');
  grid.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'sm' + (i < stamps ? ' on' : '');
    s.textContent = i < stamps ? '☕' : '';
    grid.appendChild(s);
  }
  const alert = document.getElementById('reward-alert');
  const addBtn = document.getElementById('add-btn');
  const redeemBtn = document.getElementById('redeem-btn');
  if (stamps >= 10) { alert.style.display='block'; addBtn.disabled=true; redeemBtn.style.display='block'; }
  else { alert.style.display='none'; addBtn.disabled=false; redeemBtn.style.display='none'; }
  document.getElementById('cx-card').classList.add('visible');
}
async function addStamp() {
  if (!currentCustomer) return;
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Adding...';
  const newStamps = (currentCustomer.stamps || 0) + 1;
  const newTotal  = (currentCustomer.total_stamps || 0) + 1;
  const { error } = await db.from('members').update({ stamps: newStamps, total_stamps: newTotal }).eq('id', currentCustomer.id);
  if (error) { showToast('Error. Try again.'); btn.disabled=false; btn.textContent='+ Add stamp'; return; }
  await db.from('stamp_events').insert({ member_id: currentCustomer.id, event_type: 'stamp', stamps_after: newStamps });
  currentCustomer.stamps = newStamps; currentCustomer.total_stamps = newTotal;
  showCustomer(currentCustomer);
  showToast('☕ Stamp added — ' + newStamps + '/10');
  if (newStamps >= 10) showToast('Free coffee earned!', 4000);
  if (scanner && scannerActive) setTimeout(() => { try { scanner.resume(); } catch {} }, 3000);
}
async function redeemReward() {
  if (!currentCustomer || !confirm('Confirm free coffee for ' + currentCustomer.name + '?')) return;
  await db.from('members').update({ stamps: 0 }).eq('id', currentCustomer.id);
  await db.from('stamp_events').insert({ member_id: currentCustomer.id, event_type: 'redeem', stamps_after: 0 });
  await db.from('redemptions').insert({ member_id: currentCustomer.id, redeemed_at: new Date().toISOString() });
  currentCustomer.stamps = 0; showCustomer(currentCustomer);
  showToast('Free coffee redeemed!', 4000);
}
async function loadHistory() {
  const { data } = await db.from('stamp_events').select('*, members(name, surname)').order('created_at', { ascending: false }).limit(50);
  const list = document.getElementById('hist-list');
  if (!data || !data.length) { list.innerHTML = '<div class="empty-state"><p>No activity yet</p></div>'; return; }
  list.innerHTML = data.map(ev => {
    const m = ev.members;
    const name = m ? m.name + ' ' + m.surname : 'Unknown';
    const initials = m ? (m.name[0] + m.surname[0]).toUpperCase() : '?';
    const date = new Date(ev.created_at);
    const timeStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' · ' + date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    const isRedeem = ev.event_type === 'redeem';
    return '<div class="hist-item"><div class="hist-av">'+initials+'</div><div class="hist-info"><div class="hist-name">'+name+'</div><div class="hist-time">'+timeStr+'</div></div><div class="hist-badge'+(isRedeem?' redeem':'')+'">'+( isRedeem?'Redeemed':'+1 stamp')+'</div></div>';
  }).join('');
}
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}
</script>
</body>
</html>
